<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - SamArt</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body class="contato">

  <h1>
    <span class="bg"></span>
    <a href="index.html">SamArt</a>
  </h1>

  <nav>
    <ul>
      <li><a href="Portfólio.html">Portfólio</a></li>
      <li><a href="Contato.html" class="ativo">Contato</a></li>
    </ul>
  </nav>

  <div class="ctt">
    <h2>⬇ Solicite seu serviço aqui ⬇</h2>
    <p>© SamArt</p>
  </div>

 <section class="contato-box">
  <form id="formulario">
      <input type="text" name="nome" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu Gmail" required>
      <button type="submit">Enviar</button>
  </form>

  <div class="mensagem">
      ✔ Mensagem enviada com sucesso!
  </div>
</section>
  <!-- JavaScript -->
  <script>
  // Fade-in e fade-out dos links
 document.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('loaded');
    const links = document.querySelectorAll('a[href]'); // pega todos os links
    links.forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const href = link.getAttribute('href');
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location = href;
            }, 500);
        });
    });
});
  </script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById("formulario");
    const mensagem = document.querySelector(".mensagem");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        // Pega os valores do formulário
        const nome = form.nome.value;
        const email = form.email.value;

        // Conteúdo do arquivo TXT
        const conteudo = `Nome: ${nome}\nEmail: ${email}\n----------------------\n`;

        // Cria o arquivo TXT e dispara download
        const blob = new Blob([conteudo], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "contatos.txt"; // nome do arquivo
        link.click();

        // Limpa o formulário
        form.reset();

        // Mostra mensagem de sucesso
        mensagem.classList.add("mostrar");
    });
});
</script>

</body>

</html>
